name: nodejs-feature-branch-workflow
on: 
  # some one should call this
  workflow_call:
    inputs:
      project:
        description: 'Project name'
        required: true
        type: string
      component:
        description: 'Component name'
        required: true
        type: string
env:
  project: ${{ inputs.project }}
  component: ${{ inputs.component }}
  acc_id: 334602727445

jobs:
  # Job name
  start:
    runs-on: self-hosted
    outputs:
      app_version: ${{ steps.package_version.outputs.app_version }}
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: read package.json version
        id: package_version
        run: |
          APP_VERSION=$(jq -r .version package.json)
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: check app version
        run: echo "$APP_VERSION"

  unit-tests:
    runs-on: self-hosted
    needs: start
    steps:
      - name: install dependencies
        run: npm install

      - name: unit tests
        id: unit_tests
        run: npm test

      # - name: Update status — sonar-scan
      #   uses: prasanth-devsecops-labs/workflows/.github/actions/update-commit-status@main
      #   with:
      #     token: ${{ secrets.GITHUB_TOKEN }}
      #     context: unit-tests
      #     state: ${{ steps.unit_tests.outcome }}
      #     description: Unit tests ${{ steps.unit_tests.outcome }}

      # - name: sonar scan
      #   id: sonar_scan 
      #   uses: SonarSource/sonarqube-scan-action@v8.0.0
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #     SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }} # or https://sonarcloud.io

      # - name: SonarQube Quality Gate check
      #   id: sonar_check
      #   uses: sonarsource/sonarqube-quality-gate-action@master
      #   with:
      #     pollingTimeoutSec: 600
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #     SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }} #OPTIONAL

      # - name: Update status — sonar-scan
      #   #if: always()
      #   uses: .github/actions/update-commit-status@main
      #   with:
      #     token: ${{ secrets.GITHUB_TOKEN }}
      #     context: sonar-scan
      #     state: ${{ steps.sonar_gate.outcome }}
      #     description: SonarQube quality gate ${{ steps.sonar_gate.outcome }}
  lib-scans:
    runs-on: self-hosted
    needs: unit-tests
    steps:
      - name: Check Dependabot Alerts
        id: library_scan
        uses: Posture-Cybersecurity/dependabot-security-checker@v1.1.5
        with:
          github-token: ${{ secrets.DEPENDABOT_TOKEN }}
          severities: 'critical,high'  # Only check critical and high
          output-file: 'security-report.csv'
          fail-on-alerts: 'true'  # Fail workflow if alerts found

      # - name: Update status — library-scan
      #   uses: prasanth-devsecops-labs/workflows/.github/actions/update-commit-status@main
      #   with:
      #     token: ${{ secrets.GITHUB_TOKEN }}
      #     context: unit-tests
      #     state: ${{ steps.library_scan.outcome }}
      #     description: Unit tests ${{ steps.library_scan.outcome }}

  aws-config:
    runs-on: self-hosted
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

  docker-build:
    runs-on: self-hosted
    needs: [aws-config, start]
    env:
      APP_VERSION: ${{ needs.start.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4

      - name: debug version
        run: echo "APP_VERSION=$APP_VERSION"

      - name: build image
        id: build_image
        run: |
          docker build -t  ${acc_id}.dkr.ecr.us-east-1.amazonaws.com/${project}/${component}:${APP_VERSION} .
  
  docker-scan:
    runs-on: self-hosted
    needs: docker-build
    steps:
      - name: trivy scan
        id: trivy_scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.acc_id }}.dkr.ecr.us-east-1.amazonaws.com/${{ env.project }}/${{ env.component }}:${{ env.APP_VERSION }}
          scan-type: 'image'
          vuln-type: os
          format: 'table'
          exit-code: 1
          severity: 'CRITICAL,HIGH'

      # - name: Update status — trivy-scan
      #   uses: prasanth-devsecops-labs/workflows/.github/actions/update-commit-status@main
      #   with:
      #     token: ${{ secrets.GITHUB_TOKEN }}
      #     context: unit-tests
      #     state: ${{ steps.trivy_scan.outcome }}
      #     description: Unit tests ${{ steps.trivy_scan.outcome }}

  ecr-push:
    runs-on: self-hosted
    needs: docker-scan
    steps:
      - name: push image
        id: push_image
        run: |
          docker push  ${acc_id}.dkr.ecr.us-east-1.amazonaws.com/${project}/${component}:${APP_VERSION}

      # - name: Update status — push-image
      #   uses: prasanth-devsecops-labs/workflows/.github/actions/update-commit-status@main
      #   with:
      #     token: ${{ secrets.GITHUB_TOKEN }}
      #     context: unit-tests
      #     state: ${{ steps.push_image.outcome }}
      #     description: Unit tests ${{ steps.push_image.outcome }}

      # - name: Slack alert
      #   if: always()
      #   uses: slackapi/slack-github-action@v3.0.3
      #   with:
      #     webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
      #     webhook-type: incoming-webhook
      #     payload: |
      #       text: "${{ job.status == 'success' && ':white_check_mark:' || ':x:' }} *${{ inputs.project }}/${{ inputs.component }}* feature pipeline *${{ job.status }}*"
      #       blocks:
      #         - type: "section"
      #           text:
      #             type: "mrkdwn"
      #             text: "${{ job.status == 'success' && ':white_check_mark:' || ':x:' }} *${{ inputs.project }}/${{ inputs.component }}* feature pipeline: *${{ job.status }}*\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>*"